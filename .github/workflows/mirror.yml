name: Оновлення SEO-дзеркала

on:
  schedule:
    - cron: "35 */2 * * *"   # кожні 2 години
  workflow_dispatch:
    inputs: {}

concurrency:
  group: mirror
  cancel-in-progress: false

permissions:
  contents: write   # щоб комітити згенеровані файли назад у репо

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Згенерувати сайт + пінг IndexNow
        run: python generate.py

      - name: Закомітити оновлення
        run: |
          git config user.name "mirror-bot"
          git config user.email "mirror-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Змін немає."
          else
            git commit -m "Оновлення новин $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
